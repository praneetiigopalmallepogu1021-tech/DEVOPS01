name: Simple CI Pipeline 

on:
    push:
       branches: ["main"]
    pull_request:
       branches: ["main"]
       

jobs:
 build:
  runs-on: ubuntu-latest
  permissions:
    contents: read
    packages: write

  steps:
   - name: Checkout repository    
     uses: actions/checkout@v3
   - name: step 1
     run: echo "This is my ci.yml automated pipeline run"
   - name: step 2
     run: echo "This is my second step"
   - name: breaking step
     run: echo "pipeline is fixed now"
   - name: login to ghcr
     run: echo "${{secrets.ghcr_demo}}" | docker login ghcr.io -u ${{github.actor}} --password-stdin  
   - name: build docker image
     run: docker build -t ghcr.io/${{github.actor}}/devops01.vl
   - name: push docker image 
     run: docker push ghcr.io/${{github.actor}}/devops01.vl